name: CI

on:
  push:
    branches:
      - master
      - main
      - release/**
  pull_request:
    branches:
      - master
      - main
      - release/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Go version spec
        id: go_version
        shell: bash
        run: echo "version=$(bash scripts/ci/go-version-spec.sh)" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Check public docs for machine-local paths
        run: bash scripts/check/no-local-paths.sh

      - name: Check legacy names are gone
        run: bash scripts/check/no-legacy-names.sh

      - name: Check Feishu broker guardrail
        run: bash scripts/check/feishu-call-broker.sh

      - name: Check formatting
        run: |
          files="$(find cmd internal testkit -name '*.go' | sort)"
          output="$(gofmt -l ${files})"
          if [[ -n "${output}" ]]; then
            echo "${output}"
            exit 1
          fi

      - name: Check release track versioning
        run: bash scripts/check/release-track-version.sh

      - name: Check release readiness script
        run: bash scripts/check/release-readiness-selftest.sh

      - name: Check release tag pinning
        run: bash scripts/check/release-tag-pin-selftest.sh

      - name: Check build provenance
        run: bash scripts/check/build-provenance-selftest.sh

      - name: Check release reproducibility
        run: bash scripts/check/release-reproducibility-selftest.sh

      - name: Check canonical deployment checkout
        run: bash scripts/check/canonical-checkout-selftest.sh

      - name: Check unified local release transaction
        run: bash scripts/check/unified-local-release-selftest.sh

      - name: Test web
        working-directory: web
        run: npm run test:run

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Build
        run: |
          go build ./cmd/...

      - name: Test
        timeout-minutes: 12
        run: go test -v -timeout=8m ./...

      - name: Test install and upgrade flows
        run: go test ./internal/app/install ./internal/app/wrapper ./internal/runtime ./internal/externalaccess -count=1

  go-platform:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Go version spec
        id: go_version
        shell: bash
        run: echo "version=$(bash scripts/ci/go-version-spec.sh)" >> "${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Build
        run: go build ./cmd/...

      - name: Test
        timeout-minutes: 12
        run: go test -v -timeout=8m ./...

  release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Go version spec
        id: go_version
        shell: bash
        run: echo "version=$(bash scripts/ci/go-version-spec.sh)" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Resolve artifact metadata
        id: artifact_meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            short_commit="${GITHUB_SHA::12}"
            echo "version=dev-${short_commit}" >> "${GITHUB_OUTPUT}"
            echo "package_label=dev" >> "${GITHUB_OUTPUT}"
            echo "build_flavor=dev" >> "${GITHUB_OUTPUT}"
          else
            echo "version=v0.0.0-ci.0" >> "${GITHUB_OUTPUT}"
            echo "package_label=ci" >> "${GITHUB_OUTPUT}"
            echo "build_flavor=shipping" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build release artifacts
        env:
          CODEX_REMOTE_BUILD_FLAVOR: ${{ steps.artifact_meta.outputs.build_flavor }}
          CODEX_REMOTE_PACKAGE_VERSION_LABEL: ${{ steps.artifact_meta.outputs.package_label }}
        run: |
          bash scripts/release/build-artifacts.sh \
            "${{ steps.artifact_meta.outputs.version }}" \
            dist-ci \
            --jobs 5 \
            --skip-admin-ui-build

      - name: Upload dev release artifacts
        if: ${{ github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-dist
          path: dist-ci/*
          if-no-files-found: error
          compression-level: 0

  publish-dev-release:
    needs:
      - quality-linux
      - go-platform
      - release-artifacts
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write
    uses: ./.github/workflows/dev-release.yml
    with:
      ref: ${{ github.sha }}
      artifact_name: dev-release-dist
    secrets: inherit
